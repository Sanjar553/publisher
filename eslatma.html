<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Publisher - Xabar Yuboruvchi</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; width: 80%; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>Publisher</h2>
    <input type="text" id="msgBody" placeholder="Xabar matnini kiriting...">
    <br>
    <button onclick="publishMessage()">Xabarni Nashr Etish</button>
</div>

<script>
    // 1. Ruxsat so'rash
    Notification.requestPermission();

    // 2. Publisher funksiyasi
    function publishMessage() {
        const text = document.getElementById('msgBody').value;
        
        if (Notification.permission === 'granted') {
            // Xabarni yuborish (Broker vazifasini bajaruvchi tizimga)
            new Notification("Yangi Eslatma", {
                body: text,
                icon: 'https://cdn-icons-png.flaticon.com/512/3064/3064197.png'
            });
            console.log("Xabar nashr etildi: " + text);
        } else {
            alert("Iltimos, bildirishnomalarga ruxsat bering!");
        }
    }
</script>

</body>
</html>
